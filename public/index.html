<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BugScope Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
    header { background: #1e293b; padding: 20px 40px; border-bottom: 1px solid #334155; }
    header h1 { font-size: 24px; color: #38bdf8; }
    header p { font-size: 13px; color: #94a3b8; margin-top: 4px; }
    .container { padding: 40px; max-width: 1100px; margin: 0 auto; }
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .card { background: #1e293b; border-radius: 12px; padding: 24px; border: 1px solid #334155; }
    .card h3 { font-size: 13px; color: #94a3b8; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
    .card p { font-size: 36px; font-weight: 700; color: #38bdf8; }
    .section { background: #1e293b; border-radius: 12px; padding: 24px; border: 1px solid #334155; margin-bottom: 24px; }
    .section h2 { font-size: 16px; color: #e2e8f0; margin-bottom: 16px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 12px; color: #94a3b8; padding: 8px 12px; border-bottom: 1px solid #334155; text-transform: uppercase; }
    td { padding: 12px; font-size: 14px; border-bottom: 1px solid #1e293b; }
    tr:last-child td { border-bottom: none; }
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .badge.error { background: #450a0a; color: #f87171; }
    .badge.warn { background: #451a03; color: #fb923c; }
    .badge.info { background: #082f49; color: #38bdf8; }
    .empty { color: #64748b; font-size: 14px; text-align: center; padding: 24px; }
    .refresh { background: #38bdf8; color: #0f172a; border: none; padding: 8px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 4px; }
    .refresh:hover { background: #7dd3fc; }
  </style>
</head>
<body>
  <header>
    <h1>🔍 BugScope</h1>
    <p>Error Monitoring Dashboard</p>
  </header>

  <div class="container">
    <div class="cards">
      <div class="card">
        <h3>Total Errors</h3>
        <p id="totalErrors">—</p>
      </div>
      <div class="card">
        <h3>Unique Errors</h3>
        <p id="uniqueErrors">—</p>
      </div>
      <div class="card">
        <h3>Most Seen</h3>
        <p id="mostSeen">—</p>
      </div>
    </div>

    <div class="section">
      <h2>Top Errors</h2>
      <table>
        <thead>
          <tr>
            <th>Message</th>
            <th>Level</th>
            <th>Count</th>
          </tr>
        </thead>
        <tbody id="topErrors">
          <tr><td colspan="3" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="section">
      <h2>Errors by Level</h2>
      <table>
        <thead>
          <tr><th>Level</th><th>Count</th></tr>
        </thead>
        <tbody id="byLevel">
          <tr><td colspan="2" class="empty">Loading...</td></tr>
        </tbody>
      </table>
      <br/>
      <button class="refresh" onclick="loadData()">↻ Refresh</button>
    </div>
  </div>

  <script>
    const API_KEY = prompt("Enter your API key:");

    async function loadData() {
      try {
        const res = await fetch("/metrics", {
          headers: { "x-api-key": API_KEY }
        });
        const data = await res.json();

        document.getElementById("totalErrors").textContent = data.totalErrors ?? "0";
        document.getElementById("uniqueErrors").textContent = data.topErrors?.length ?? "0";
        document.getElementById("mostSeen").textContent = data.topErrors?.[0]?.count ?? "0";

        const topBody = document.getElementById("topErrors");
        if (data.topErrors?.length) {
          topBody.innerHTML = data.topErrors.map(e => `
            <tr>
              <td>${e.message}</td>
              <td><span class="badge ${e.level}">${e.level}</span></td>
              <td>${e.count}</td>
            </tr>
          `).join("");
        } else {
          topBody.innerHTML = '<tr><td colspan="3" class="empty">No errors logged yet.</td></tr>';
        }

        const levelBody = document.getElementById("byLevel");
        if (data.errorsByLevel?.length) {
          levelBody.innerHTML = data.errorsByLevel.map(l => `
            <tr>
              <td><span class="badge ${l._id}">${l._id}</span></td>
              <td>${l.count}</td>
            </tr>
          `).join("");
        } else {
          levelBody.innerHTML = '<tr><td colspan="2" class="empty">No data.</td></tr>';
        }

      } catch (err) {
        console.error("Failed to load metrics:", err);
      }
    }

    loadData();
  </script>
</body>
</html>
